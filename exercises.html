  <main class="container">
    <section>
      <h2>Practice Problems</h2>

      <div class="exercise">
        <div><strong>1.</strong> Solve 2x + 3 = 11.</div>
        <button class="btn toggle-solution">Show solution</button>
        <div class="solution">2x + 3 = 11 → 2x = 8 → x = 4</div>
      </div>

      <div class="exercise">
        <div><strong>2.</strong> Solve x² - 5x + 6 = 0.</div>
        <button class="btn toggle-solution">Show solution</button>
        <div class="solution">Factor: (x-2)(x-3)=0 → x = 2 or x = 3</div>
      </div>

      <div class="exercise">
        <div><strong>3.</strong> If f(x)=x², compute f'(x) and f'(3).</div>
        <button class="btn toggle-solution">Show solution</button>
        <div class="solution">f'(x)=2x so f'(3)=6</div>
      </div>

    </section>
  </main>

  <footer class="site-footer"><div class="container">Practice regularly — try to solve before showing solutions.</div></footer>
  <script src="script.js"></script>
